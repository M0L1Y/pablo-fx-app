<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo FX App - Asistente de Salud Mental</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #1a1a1e;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #29292e;
        }
        h1 { margin: 0; font-size: 1.4rem; color: #04d361; }
        p { margin: 5px 0 0 0; font-size: 0.9rem; color: #a8a8b3; }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .user-message {
            background-color: #04d361;
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background-color: #202024;
            color: #e1e1e6;
            align-self: flex-start;
            border-bottom-left-radius: 0;
            border: 1px solid #29292e;
        }
        #input-container {
            padding: 20px;
            background-color: #1a1a1e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #29292e;
        }
        input {
            flex: 1;
            padding: 12px;
            background-color: #121214;
            border: 1px solid #29292e;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
        }
        input:focus { border-color: #04d361; outline: none; }
        button {
            padding: 12px 24px;
            background-color: #04d361;
            color: #000000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #00b34d; }
    </style>
</head>
<body>

    <header>
        <h1>Asistente de Bienestar</h1>
        <p>Un espacio seguro para organizar tus ideas y desahogarte</p>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            Hola, soy tu asistente de salud mental. Estoy aquí para escucharte sin juicios, ayudarte con la ansiedad o el TDAH, y organizar lo que tienes en mente. ¿De qué te gustaría hablar hoy?
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Escribe lo que sientes o piensas aquí..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', isUser ? 'user-message' : 'bot-message');
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('message', 'bot-message');
            loadingDiv.innerText = 'Escribiendo...';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                if (chatContainer.contains(loadingDiv)) {
                    chatContainer.removeChild(loadingDiv);
                }

                if (data.reply) {
                    appendMessage(data.reply, false);
                } else {
                    appendMessage('Lo siento, el servidor no devolvió una respuesta válida.', false);
                }
            } catch (error) {
                console.error(error);
                if (chatContainer.contains(loadingDiv)) {
                    chatContainer.removeChild(loadingDiv);
                }
                appendMessage('Error de conexión con el asistente.', false);
            }
        }
    </script>
</body>
</html>
